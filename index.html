<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>梦路小町 · 档案系统</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
background:#0d0d0d;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:white;
}

.container{
max-width:560px;
margin:auto;
padding:24px;
border:2px solid #ff4db8;
border-radius:24px;
background:linear-gradient(
180deg,
rgba(25,25,25,0.98),
rgba(10,10,10,0.98)
);
box-shadow:
0 0 30px rgba(255,0,140,0.25),
0 0 80px rgba(255,0,140,0.08);
}

.title{
text-align:center;
font-size:38px;
font-weight:700;
color:#ff5dbf;
margin-bottom:24px;
}

.title span{
font-size:42px;
margin-right:10px;
}

.row{
display:flex;
gap:12px;
}

.row .half{
flex:1;
}

input,
textarea,
select{
width:100%;
padding:16px;
margin-top:12px;
background:#202020;
border:none;
border-radius:14px;
color:white;
font-size:17px;
outline:none;
transition:0.2s;
}

input:focus,
textarea:focus,
select:focus{
background:#2b2b2b;
box-shadow:0 0 0 2px #ff4db8;
}

textarea{
resize:vertical;
min-height:110px;
}

.big{
min-height:150px;
}

button{
width:100%;
margin-top:22px;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(
90deg,
#ff6bbf,
#ff1493
);
color:white;
font-size:22px;
font-weight:700;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(255,20,147,0.4);
}

.outputLabel{
margin-top:26px;
margin-bottom:10px;
font-size:18px;
color:#d0d0d0;
}

#output{
height:320px;
background:#050505;
color:#00ff99;
font-family:Consolas,monospace;
font-size:14px;
}

.success{
background:linear-gradient(
90deg,
#00c97d,
#00e39b
) !important;
}

.fade{
animation:fadein 0.25s ease;
}

@keyframes fadein{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container fade">

<div class="title">
<span>📋</span>梦路小町 · 档案系统
</div>

<div class="row">
<input class="half" id="name" placeholder="姓名">
<input class="half" id="age" placeholder="年龄">
</div>

<input id="job" placeholder="前职业">

<input id="appearance" placeholder="外貌特征">

<select id="virgin">
<option value="是">是否为处女：是</option>
<option value="否">是否为处女：否</option>
</select>

<textarea id="personality" placeholder="性格描述"></textarea>

<textarea id="history" class="big" placeholder="过往经历"></textarea>

<button id="generateBtn">
生成档案并开始开局
</button>

<div class="outputLabel">
↓ 档案内容（复制成功后点一下即可全选）
</div>

<textarea id="output"></textarea>

</div>

<script>

const btn = document.getElementById('generateBtn');

btn.addEventListener('click', () => {

const yaml =
`character:
  姓名: "${document.getElementById('name').value}"
  年龄: "${document.getElementById('age').value}"
  前职业: "${document.getElementById('job').value}"
  外貌特征: "${document.getElementById('appearance').value}"
  是否为处女: "${document.getElementById('virgin').value}"

  性格描述: |
    ${document.getElementById('personality').value}

  过往经历: |
    ${document.getElementById('history').value}

system_prompt: |
  我将扮演该自定义角色，作为研究生加入梦路小町。
`;

const output = document.getElementById('output');

output.value = yaml;

output.focus();

output.select();

try{
navigator.clipboard.writeText(yaml);
}catch(e){}

try{
document.execCommand('copy');
}catch(e){}

btn.innerText = '✓ 档案已复制';

btn.classList.add('success');

setTimeout(() => {
btn.innerText = '生成档案并开始开局';
btn.classList.remove('success');
},2000);

try{

const parentDoc = window.parent.document;

const stInput =
parentDoc.querySelector('#send_textarea');

if(stInput){

stInput.value = yaml;

stInput.dispatchEvent(
new Event('input',{bubbles:true})
);

}

}catch(e){
console.log(e);
}

});

</script>

</body>
</html>
