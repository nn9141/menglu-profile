<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:#111;
padding:20px;
margin:0;
font-family:sans-serif;
color:white;
}

.box{
max-width:520px;
margin:auto;
padding:20px;
border:2px solid hotpink;
border-radius:20px;
background:#181818;
}

.title{
text-align:center;
font-size:32px;
font-weight:bold;
color:hotpink;
margin-bottom:20px;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:120px;
resize:vertical;
}

button{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:14px;
background:hotpink;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

#output{
height:260px;
background:black;
color:#00ff99;
font-family:monospace;
margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<div class="title">
📋 梦路小町 · 档案系统
</div>

<input id="name" placeholder="姓名">

<input id="age" placeholder="年龄">

<input id="job" placeholder="前职业">

<input id="appearance" placeholder="外貌特征">

<select id="virgin">
<option value="是">是否为处女：是</option>
<option value="否">是否为处女：否</option>
</select>

<textarea id="personality" placeholder="性格描述"></textarea>

<textarea id="history" placeholder="过往经历"></textarea>

<button onclick="generateProfile()">
生成档案并复制
</button>

<textarea id="output" placeholder="档案内容"></textarea>

</div>

<script>

function generateProfile(){

var yaml =
'character:\\n' +

'  姓名: "' +
document.getElementById('name').value +
'"\\n' +

'  年龄: "' +
document.getElementById('age').value +
'"\\n' +

'  前职业: "' +
document.getElementById('job').value +
'"\\n' +

'  外貌特征: "' +
document.getElementById('appearance').value +
'"\\n' +

'  是否为处女: "' +
document.getElementById('virgin').value +
'"\\n\\n' +

'  性格描述: |\\n    ' +
document.getElementById('personality').value +
'\\n\\n' +

'  过往经历: |\\n    ' +
document.getElementById('history').value +
'\\n\\n' +

'system_prompt: |\\n' +
'  我将扮演该自定义角色，作为研究生加入梦路小町。';

var output =
document.getElementById('output');

output.value = yaml;

output.focus();

output.select();

try{
document.execCommand('copy');
}catch(e){}

try{

var stInput =
window.parent.document.querySelector('#send_textarea');

if(stInput){

stInput.value = yaml;

var evt =
document.createEvent('HTMLEvents');

evt.initEvent('input', true, true);

stInput.dispatchEvent(evt);

}

}catch(e){}

}

</script>

</body>
</html>
